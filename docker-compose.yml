version: '3.8'

services:
  anti-theft-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: anti-theft-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./server/certs:/app/certs:ro
      - ./server/public:/app/public:ro
      - ./server/src/config:/app/src/config:ro
      - ./server/data:/app/data
    environment:
      # Server configuration
      - PORT=3000
      - NODE_ENV=production
      - LOG_LEVEL=info
      # Add more environment variables as needed
    networks:
      - anti-theft-network
    healthcheck:
      test: ["CMD", "node", "-e", "process.env.NODE_TLS_REJECT_UNAUTHORIZED='0';require('https').get('https://localhost:3000/api/status',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Resource limits (adjust as needed)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

networks:
  anti-theft-network:
    driver: bridge
